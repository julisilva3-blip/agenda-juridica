  button:hover { background: #2c5282; }

const ITER = 310000;

function b64bytes(s) {
  const bin = atob(s); const a = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
  return a;
}

async function decifrar(senha) {
  const dados = b64bytes(BLOB);
  const salt = dados.slice(0, 16), iv = dados.slice(16, 28), corpo = dados.slice(28);
  const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(senha), 'PBKDF2', false, ['deriveKey']);
  const chave = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: ITER, hash: 'SHA-256' },
    material, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  const claro = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, chave, corpo);
  return new TextDecoder().decode(claro);
}

async function entrar(senha, lembrar) {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Abrindo...';
  try {
    const html = await decifrar(senha);
    if (lembrar) localStorage.setItem('agenda_acesso', btoa(unescape(encodeURIComponent(senha))));
    document.open(); document.write(html); document.close();
  } catch(e) {
    localStorage.removeItem('agenda_acesso');
    document.getElementById('erro').style.display = 'block';
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

document.getElementById('form').addEventListener('submit', ev => {
  ev.preventDefault();
  entrar(document.getElementById('senha').value, document.getElementById('lembrar').checked);
});

// Entrada automática se já conectada neste aparelho
const salva = localStorage.getItem('agenda_acesso');
if (salva) {
  try { entrar(decodeURIComponent(escape(atob(salva))), true); } catch(e) {}
}
